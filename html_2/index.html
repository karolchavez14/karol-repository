<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Final HTML Project</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

  <section id="main" class="id">
    <h1>My Final HTML Project</h1>
    <p>This project demonstrates HTML skills.</p>
  </section>

  <p>Inspired by <cite>MDN Web Docs</cite></p>
  <p>Example code: <code>&lt;section&gt;</code></p>

  <a href="https://www.google.com" target="_blank">Visit Google</a><br>
  <a href="https://www.wikipedia.org">Wikipedia</a><br>
  <a href="about.html">About Page</a>

  <form action="#" method="post">
    <label>Name:</label>
    <input type="text" name="username" placeholder="Enter your name"><br><br>

    <label>Message:</label><br>
    <textarea name="message" rows="4" cols="30"></textarea><br><br>

    <label>
      <input type="checkbox" name="agree"> I agree
    </label><br><br>

    <input type="submit" value="Submit">
  </form>

  <!-- Table -->
  <table border="1">
    <tr>
      <td colspan="2">Schedule</td>
    </tr>
    <tr>
      <td rowspan="2">Monday</td>
      <td>Math</td>
    </tr>
    <tr>
      <td>English</td>
    </tr>
  </table>

  <!-- Multimedia -->
  <video controls width="300">
    <source src="video.mp4" type="video/mp4">
  </video>

  <audio controls>
    <source src="audio.mp3" type="audio/mpeg">
  </audio>

  <!-- Tags with multiple attributes -->
  <img src="image.jpg" alt="Sample Image" width="200" height="150">
  <input type="text" id="text" class="text">
  <button type="button" class="btn" id="btn">Click</button>
  <a href="https://example.com" target="_blank" class="link">Example</a>

</body>
</html>
